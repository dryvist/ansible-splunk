---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))
      - id: end-of-file-fixer
        exclude: ^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))
      - id: check-yaml
        args: [--unsafe]
        exclude: ^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: ^\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint
        language: system
        files: ^(playbooks|roles|inventory)/.*\.(yaml|yml)$
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json, --fix]
        exclude: ^(\.github/(aw/|workflows/(.*\.lock\.yml|agentics-maintenance\.yml))|CHANGELOG\.md$)

---
# Repo-specific data-contract checks for ansible-splunk.
#
# Lint + molecule are centralized in dryvist/.github/_ansible-ci.yml. The checks
# here are NOT generic ansible CI — they assert THIS repo's data contract
# (playbook syntax against a mock tofu inventory, input-template unit tests, and
# that the tofu inventory loads with the right group assignments). They stay
# local and are aggregated by the wrapper's "Merge Gate".

name: Data Contract

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Cache Ansible collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('requirements.yml') }}

      - name: Install dependencies
        run: |
          uv pip install --system ansible

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Create mock OpenTofu inventory for syntax checks
        run: |
          cp inventory/tofu_inventory.json.example inventory/tofu_inventory.json

      - name: Syntax check deploy.yml
        run: |
          ansible-playbook playbooks/deploy.yml --syntax-check

      - name: Syntax check configure_indexes.yml
        run: |
          ansible-playbook playbooks/configure_indexes.yml --syntax-check

      - name: Syntax check validate.yml
        run: |
          ansible-playbook playbooks/validate.yml --syntax-check

      - name: Syntax check site.yml
        run: |
          ansible-playbook playbooks/site.yml --syntax-check

      - name: Run template unit tests
        run: |
          python3 tests/templates/test_inputs_conf.py

  verify-inventory:
    name: Verify Inventory Load
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Ansible and collections
        run: |
          pip install ansible ansible-core netaddr
          ansible-galaxy collection install ansible.utils

      - name: Verify tofu inventory loads correctly
        env:
          TOFU_INVENTORY_PATH: ${{ github.workspace }}/tests/inventory_load/tofu_inventory.json
        run: |
          ansible-playbook tests/inventory_load/verify_inventory.yml \
            -i inventory/hosts.yml \
            -c local

      - name: Verify example inventory has correct structure
        run: |
          python3 tests/inventory_load/check_example_structure.py

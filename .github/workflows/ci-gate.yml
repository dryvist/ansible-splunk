---
# CI Gate — wrapper around the shared ansible CI gate.
#
# Generic ansible CI (the standardized change filter, ansible-lint, and the
# molecule run) lives in dryvist/.github/.github/workflows/_ansible-ci.yml so it
# stays identical across ansible-proxmox, ansible-proxmox-apps and this repo.
#
# This repo adds repo-specific data-contract checks (_data-contract.yml) that the
# shared workflow does NOT own. So it calls the shared workflow with
# emit_gate:false and owns the required "Merge Gate" itself, aggregating the
# shared result plus the local data-contract job. The local-job gate reuses the
# shared workflow's `ansible` filter output — one change-detection definition.

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: read
    uses: dryvist/.github/.github/workflows/_ansible-ci.yml@main
    with:
      # ansible-lint runs yamllint internally on ansible content; scope it to the
      # same dirs the retired local lint job used.
      lint_args: "playbooks/ roles/"
      molecule_requirements: requirements-ci.txt
      emit_gate: false

  data-contract:
    name: Data Contract
    needs: ci
    if: ${{ needs.ci.outputs.ansible == 'true' }}
    uses: ./.github/workflows/_data-contract.yml

  gate:
    name: Merge Gate
    needs: [ci, data-contract]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all results
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: data-contract
          jobs: ${{ toJSON(needs) }}

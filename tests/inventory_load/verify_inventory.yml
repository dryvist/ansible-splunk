---
# Verify that load_tofu.yml correctly resolves splunk host from
# tofu_inventory.json without needing SPLUNK_VM_HOST env var.
#
# Run from repo root:
#   TOFU_INVENTORY_PATH=tests/inventory_load/tofu_inventory.json \
#     ansible-playbook tests/inventory_load/verify_inventory.yml \
#     -i inventory/hosts.yml -c local
- name: Verify tofu inventory loads correctly
  hosts: localhost
  gather_facts: false
  vars:
    tofu_inventory_file_path: >-
      {{ lookup('env', 'TOFU_INVENTORY_PATH')
         | default(playbook_dir ~ '/tofu_inventory.json', true) }}

  tasks:
    - name: Stat the test tofu inventory
      ansible.builtin.stat:
        path: "{{ tofu_inventory_file_path }}"
      register: stat_result

    - name: Assert test inventory file exists
      ansible.builtin.assert:
        that: stat_result.stat.exists
        fail_msg: "Test fixture not found: {{ tofu_inventory_file_path }}"

    - name: Load test tofu inventory
      ansible.builtin.include_vars:
        file: "{{ tofu_inventory_file_path }}"
        name: tofu_data

    - name: Assert splunk_vm is at root level (not under ansible_inventory)
      ansible.builtin.assert:
        that:
          - tofu_data.splunk_vm is defined
          - tofu_data.splunk_vm.splunk is defined
        fail_msg: >-
          splunk_vm not found at root level of tofu_inventory.json.
          Keys found: {{ tofu_data.keys() | list }}.
          If 'ansible_inventory' is in the keys, the JSON structure is wrong
          (nested one level too deep).

    - name: Assert required splunk host fields are present
      ansible.builtin.assert:
        that:
          - tofu_data.splunk_vm.splunk.ip is defined
          - tofu_data.splunk_vm.splunk.hostname is defined
          - tofu_data.splunk_vm.splunk.vmid is defined
          - tofu_data.splunk_vm.splunk.ansible_connection is defined
        fail_msg: >-
          Missing required fields in splunk_vm.splunk.
          Got: {{ tofu_data.splunk_vm.splunk.keys() | list }}

    - name: Assert IP is a valid address format
      ansible.builtin.assert:
        that: tofu_data.splunk_vm.splunk.ip | ansible.utils.ipaddr('bool')
        fail_msg: "splunk_vm.splunk.ip is not a valid IP: {{ tofu_data.splunk_vm.splunk.ip }}"

    - name: Print resolved splunk host info
      ansible.builtin.debug:
        msg:
          - "splunk hostname: {{ tofu_data.splunk_vm.splunk.hostname }}"
          - "splunk ip: {{ tofu_data.splunk_vm.splunk.ip }}"
          - "splunk vmid: {{ tofu_data.splunk_vm.splunk.vmid }}"

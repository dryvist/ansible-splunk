---
# Pre-playbook that loads OpenTofu infrastructure data dynamically
# This playbook runs first to populate the Ansible inventory from OpenTofu outputs,
# eliminating hardcoded VM IPs from Ansible configuration.
#
# It expects tofu_inventory.json to be present (generated via:
#   ./scripts/sync-tofu-inventory.sh
# or manually:
#   cd ~/git/terraform-proxmox/main && terragrunt output -json ansible_inventory > \
#     ~/git/ansible-splunk/inventory/tofu_inventory.json

- name: Load OpenTofu Infrastructure Inventory
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Check if OpenTofu inventory file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../inventory/tofu_inventory.json"
      register: tofu_inventory_file

    - name: Load OpenTofu inventory JSON
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/tofu_inventory.json"
        name: tofu_data
      when: tofu_inventory_file.stat.exists

    - name: Fail if OpenTofu inventory is missing in production
      ansible.builtin.fail:
        msg: |
          tofu_inventory.json not found at {{ playbook_dir }}/../inventory/tofu_inventory.json

          To generate it, run:
            ./scripts/sync-tofu-inventory.sh

          Or manually:
            cd ~/git/terraform-proxmox/main && \
            terragrunt output -json ansible_inventory > \
            ~/git/ansible-splunk/inventory/tofu_inventory.json

          For static inventory fallback, ensure SPLUNK_VM_HOST environment variable is set:
            export SPLUNK_VM_HOST="splunk.example.com"
      when: not tofu_inventory_file.stat.exists and not (lookup('env', 'SPLUNK_VM_HOST') | default(''))

    - name: Add Splunk VM to inventory (SSH connection)
      ansible.builtin.add_host:
        name: splunk
        groups:
          - splunk
          - all
        ansible_host: "{{ tofu_data.splunk_vm.splunk.ip }}"
        ansible_connection: "{{ tofu_data.splunk_vm.splunk.ansible_connection | default('ssh') }}"
        # NOTE:
        #   The 'debian' user must have passwordless sudo on the target host.
        #   Downstream playbooks (e.g. deploy_docker.yml) use 'become: true'
        #   and rely on this user being able to escalate privileges via sudo
        #   without requiring an interactive password.
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') | mandatory }}"
        ansible_python_interpreter: /usr/bin/python3
        hostname: "{{ tofu_data.splunk_vm.splunk.hostname }}"
        vmid: "{{ tofu_data.splunk_vm.splunk.vmid }}"
      when: tofu_inventory_file.stat.exists and tofu_data.splunk_vm.splunk is defined

    # Push tofu_data onto every dynamically-added host so roles can access
    # tofu_data.constants.* directly without hostvars['localhost'] indirection.
    - name: Propagate tofu_data to all inventory hosts
      ansible.builtin.set_fact:
        tofu_data: "{{ tofu_data }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
      when: tofu_data is defined

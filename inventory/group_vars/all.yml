---
# Common variables for all hosts
ansible_user: root
ansible_become: true
ansible_python_interpreter: /usr/bin/python3

# System configuration
system_timezone: UTC

# NTP: point systemd-timesyncd at the self-hosted Proxmox stratum-2 servers
# when Doppler provides PROXMOX_NTP_SERVERS (comma-separated bare IPs/hostnames).
# The ntp role renders these as timesyncd NTP= (bare host list — it strips any
# trailing options), with the Debian public pool as FallbackNTP=. Empty value
# leaves only the pool fallback, so the role stays safe when Doppler omits it.
# Splunk _time correlation depends on accurate clocks.
ntp_servers: >-
  {{ lookup('env', 'PROXMOX_NTP_SERVERS')
     | split(',') | map('trim') | reject('equalto', '') | list }}

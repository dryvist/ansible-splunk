---
# Static inventory for fallback when OpenTofu inventory is unavailable
# Prefer dynamic inventory: playbooks import inventory/load_tofu.yml, which
# resolves TOFU_INVENTORY_PATH -> the S3 published artifact -> the local cache.
#
# Static fallback addressing (this file): SPLUNK_VM_HOST wins when set;
# otherwise DNS-first — the VM's hostname A-record splunk-aio.{PROXMOX_DOMAIN}
# (Technitium derives it from the same tofu inventory).

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_become: false
  children:
    splunk:
      hosts:
        splunk-01:
          ansible_host: "{{ lookup('env', 'SPLUNK_VM_HOST') | default('splunk-aio.' ~ lookup('env', 'PROXMOX_DOMAIN'), true) }}"
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

---
# Splunk Docker role defaults

# Docker configuration
splunk_docker_package_name: docker.io
splunk_docker_compose_package: docker-compose-plugin

# Splunk container configuration
# Splunk image - use :latest or pin a specific version like 9.1.2 when upgrading.
# Note: If specifying a version not yet pulled, ensure the VM has network access to Docker Hub.
splunk_docker_image: splunk/splunk:latest
splunk_docker_hostname: splunk
splunk_docker_container_name: splunk

# Splunk credentials (from Doppler) - set in playbook vars
splunk_docker_password: ""

# Destination for saved-search alert emails. Override per-inventory or
# per-playbook. Empty string disables email delivery on the matched alert
# (the saved search still runs and surfaces in the Splunk UI's Triggered
# Alerts panel — only the email action is no-op'd).
splunk_docker_alert_email: ""

# Splunk General Terms acceptance string for SPLUNK_GENERAL_TERMS env var.
# Override in staging to point at non-prod terms acceptance strings if Splunk
# publishes a new SGT version mid-release cycle.
splunk_docker_sgt_accept: "--accept-sgt-current-at-splunk-com"

# HEC token values — dict of { index_name: token_uuid }.
# When HEC_NAMESPACE is set, a dedicated per-index token is derived for each
# index; the 'legacy' shared token always stays = SPLUNK_HEC_TOKEN so it never
# rotates while senders migrate to their per-index tokens (then it is retired).
splunk_docker_hec_token_values: {}

# HEC namespace UUID for per-index token derivation (from Doppler HEC_NAMESPACE).
# Token = 'splunk-hec-<index>' | to_uuid(namespace)  (Ansible core to_uuid =
# uuid5). Any sender with the same namespace derives the identical token, so no
# per-index secret is ever stored or shared — only this namespace UUID is.
splunk_docker_hec_namespace: ""

# Splunk ports
splunk_docker_web_port: 8000
splunk_docker_hec_port: 8088
# Management API port (splunkd REST). Bound to 0.0.0.0 so external tools
# (MCP Server, CI validation) can reach the REST API.
# Proxmox firewall controls network-level access to this port.
splunk_docker_mgmt_port: 8089
splunk_docker_mgmt_bind: "0.0.0.0"

# Splunk Web SSL (enableSplunkWebSSL)
splunk_docker_web_ssl: true

# Health check control
# Set to false in CI (Molecule) where 127.0.0.1:8000 is unreachable from inside the test container.
splunk_docker_wait_enabled: true

# Internet access control
# Disabled by default for air-gapped/network-isolated VMs.
# When false, disables Splunkbase app browsing, update checks, and telemetry
# which otherwise cause ~80-second DNS timeout delays on every page load.
splunk_docker_allow_internet_access: false

# NOTE: HEC uses HTTPS by default (the Splunk Docker image enables SSL).
# Clients (Cribl Edge, Cribl Stream) must send to https://<host>:<hec_port>.
# The inputs.conf template does not set enableSSL, so the image default
# (SSL enabled) applies. Do not change this without updating all HEC senders.

# Splunk data directories
splunk_docker_data_dir: /opt/splunk
splunk_docker_var_dir: "{{ splunk_docker_data_dir }}/var"
splunk_docker_etc_dir: "{{ splunk_docker_data_dir }}/etc"

# Splunk configuration directory (for compose and configs)
splunk_docker_config_dir: /opt/splunk-config

# Index retention defaults
# 100 GiB in MiB: 100 * 1024 = 102400 MiB (approx. "100GB" index size)
# 365 days in seconds: 365 * 24 * 60 * 60 = 31536000 seconds
splunk_docker_index_default_max_size_mb: 102400
splunk_docker_index_default_frozen_time_secs: 31536000

# Indexes to create
splunk_docker_indexes:
  - name: ai
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: claude
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: firewall
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: gemini
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  # llm: local LLM-stack telemetry (model-server manager + worker logs,
  # AI-stack process metrics, AI gateway logs) shipped via Cribl Edge -> Stream.
  - name: llm
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: mac_perf
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  # netflow: high-volume UniFi IPFIX flow records (split from network) — 90-day
  # retention + 50 GB cap per terraform-proxmox docs/SPLUNK_INDEXES.md, not the default.
  - name: netflow
    max_size_mb: 51200
    frozen_time_secs: 7776000
  # netmon_metrics: high-volume per-WAN probe telemetry (Telegraf via Cribl) — 90-day
  # retention per terraform-proxmox docs/NETWORK_DIAGNOSIS.md, not the 365-day default.
  # Telegraf ships splunkmetric -> metric index (queryable via mstats), NOT events.
  # Metric indexes carry the _metrics suffix by convention.
  - name: netmon_metrics
    datatype: metric
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: 7776000
  # unifi_metrics: UniFi controller telemetry (device cpu/mem/temp, per-port,
  # per-client, WAN quality) from unpoller+Telegraf via Cribl — 90-day retention,
  # matching netmon. See ansible-proxmox-apps roles/unifi_metrics.
  - name: unifi_metrics
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: 7776000
  - name: network
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: openai
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: otel
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: os
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  - name: unifi
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"
  # unifi_metrics: UniFi controller telemetry (unpoller -> Telegraf -> Cribl).
  # High-volume metric series — 90-day retention per terraform-proxmox docs, not
  # the 365-day default. Distinguished from netmon by the stream=unifi_metrics tag.
  # Telegraf ships splunkmetric -> metric index (queryable via mstats), NOT events.
  - name: unifi_metrics
    datatype: metric
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: 7776000
  - name: vscode
    max_size_mb: "{{ splunk_docker_index_default_max_size_mb }}"
    frozen_time_secs: "{{ splunk_docker_index_default_frozen_time_secs }}"


# Firewall configuration
# DISABLED: Proxmox firewall is the single source of truth for network security.
# Guest-level iptables rules conflict with Docker's FORWARD chain and break
# container port forwarding. See terraform-proxmox/modules/firewall for rules.
splunk_docker_firewall_enabled: false

# Service user - IMPORTANT: Use splunk user UID inside container (41812)
# NOT root. This ensures proper file ownership for Splunk apps.
splunk_docker_user: "41812"
splunk_docker_group: "41812"

# Java Runtime for Splunk DB Connect
# Disabled by default; enable in inventory for hosts that need DB Connect.
splunk_docker_java_enabled: false
splunk_docker_java_version: "21"
# Pin to major version; for full pin use e.g. temurin-21-jre=21.0.7+6-1
splunk_docker_java_package: "temurin-{{ splunk_docker_java_version }}-jre"
splunk_docker_java_arch: "amd64"
splunk_docker_java_home: "/usr/lib/jvm/temurin-{{ splunk_docker_java_version }}-jre-{{ splunk_docker_java_arch }}"
# Container-internal path where the JRE is bind-mounted (decoupled from host path)
splunk_docker_java_container_home: "/opt/java"

# MS SQL Server JDBC driver for DB Connect
# Downloads mssql-jdbc from Maven Central into the DB Connect drivers/ directory.
splunk_docker_mssql_driver_enabled: false
splunk_docker_mssql_driver_version: "12.8.1.jre11"

# Artifact store (object-storage / RustFS)
# Custom add-ons with artifact_store: true are downloaded from this URL.
# The splunk-addons bucket has an anonymous read policy on the internal network
# (no auth needed). IP and port come from tofu inventory — no hardcoded values.
# The container key is hyphenated, so bracket notation is required (dot notation
# would mis-parse `object-storage` as subtraction).
splunk_docker_artifact_base_url: >-
  http://{{ tofu_data.containers['object-storage'].ip }}:{{
  tofu_data.constants.service_ports.object_storage_s3 }}/splunk-addons
# VisiCore TA and App are downloaded from GitHub Releases (latest) automatically.
# object-storage-sourced add-ons use version-free filenames — current version is
# tracked via the object tag, and prior versions are retained by bucket versioning.

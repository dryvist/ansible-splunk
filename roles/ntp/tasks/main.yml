---
# Time synchronization via systemd-timesyncd — Debian's built-in SNTP client.
#
# Replaces the previous chrony role. chrony's `validate: chronyd -p -f %s` ran
# as the privilege-dropped `_chrony` user and could not read Ansible's 0700
# staged temp file, aborting every site.yml deploy at the NTP step whether the
# temp lived under $HOME (ProtectHome) or /tmp (perms) — see #274/#279. timesyncd
# needs no package install and no config validation, so that whole class of
# breakage is gone. The Splunk VM is a pure NTP *client*: it points at the
# internal Proxmox stratum-2 servers (ntp_servers) with the public Debian pool
# as fallback (ntp_pools).

- name: Ensure tzdata is present
  ansible.builtin.apt:
    name: tzdata
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - ntp

# chrony and systemd-timesyncd both discipline the system clock and conflict if
# both run. Remove chrony first so the timesyncd install/enable below owns time.
- name: Remove chrony (superseded by systemd-timesyncd)
  ansible.builtin.apt:
    name: chrony
    state: absent
    purge: true
  tags:
    - ntp

# systemd-timesyncd is a separate Debian package and is NOT installed by default
# when another NTP daemon (chrony) was present — install it explicitly, after
# chrony is gone, so the service exists for the enable/start task below.
- name: Install systemd-timesyncd
  ansible.builtin.apt:
    name: systemd-timesyncd
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - ntp

- name: Configure systemd-timesyncd time sources
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-timesyncd
  tags:
    - ntp

- name: Enable and start systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: started
    enabled: true
  when: ansible_virtualization_type | default('') != 'docker'
  tags:
    - ntp

---
# NTP role defaults (systemd-timesyncd client)

# Internal NTP servers to sync from (systemd-timesyncd NTP=). Set on clients to
# the Proxmox stratum-2 servers; populated from PROXMOX_NTP_SERVERS in site.yml.
# Entries may carry chrony-style options (e.g. "10.0.10.10 iburst") — only the
# first token (host) is used, since timesyncd takes a bare host list.
ntp_servers: []

# Public NTP pool, rendered as systemd-timesyncd FallbackNTP= so the clock still
# disciplines if the internal servers are unreachable.
ntp_pools:
  - "0.debian.pool.ntp.org"
  - "1.debian.pool.ntp.org"
  - "2.debian.pool.ntp.org"
  - "3.debian.pool.ntp.org"

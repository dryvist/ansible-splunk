---
# Main site playbook for Splunk deployment
# This playbook orchestrates the complete deployment workflow

# Load dynamic inventory from OpenTofu outputs (if available)
- name: Load OpenTofu inventory
  ansible.builtin.import_playbook: ../inventory/load_tofu.yml

# Resolve the latest Splunkbase app versions and mirror them into MinIO BEFORE
# deploying, so every run installs current apps. Runs entirely on the controller
# (which has internet egress); the Splunk VM stays air-gapped and only pulls from
# MinIO. Fail-soft: a Splunkbase outage is rescued inside this playbook and the
# deploy proceeds from whatever MinIO already holds. Requires the Splunkbase +
# MinIO secrets in the environment (provided by `doppler run --`).
- name: Sync latest Splunkbase apps into MinIO (in-flow, fail-soft)
  ansible.builtin.import_playbook: sync-splunkbase.yml

# Configure NTP time synchronization BEFORE deploying Splunk. Splunk's
# _time correlation depends on accurate clocks; points at the Proxmox
# hosts (stratum-2 servers managed by ansible-proxmox) when Doppler
# provides PROXMOX_NTP_SERVERS, falls back to Debian public pool when not.
- name: Configure NTP time synchronization
  hosts: splunk
  become: true
  gather_facts: true
  tags:
    - ntp
    - time
  roles:
    - role: ntp
  post_tasks:
    - name: Flush NTP handlers so chrony restart runs before Splunk deploys
      ansible.builtin.meta: flush_handlers

    - name: Wait for chrony to synchronize the clock
      ansible.builtin.command: chronyc waitsync 5 0.1
      register: ntp_waitsync
      changed_when: false
      tags:
        - ntp
        - time

- name: Deploy Splunk
  hosts: splunk
  become: true
  gather_facts: true

  # Load the role's index list up front so the per-index HEC token derivation
  # below can reference splunk_docker_indexes before the role is included
  # (mirrors playbooks/validate.yml).
  vars_files:
    - ../roles/splunk_docker/defaults/main.yml

  tasks:
    - name: Validate required environment variables
      ansible.builtin.assert:
        that:
          - lookup('env', 'SPLUNK_PASSWORD') | length > 0
          - lookup('env', 'SPLUNK_HEC_TOKEN') | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD and SPLUNK_HEC_TOKEN must be set
          (use: doppler run -- ansible-playbook ...)
      run_once: true
      delegate_to: localhost

    - name: Set Splunk credentials from environment
      ansible.builtin.set_fact:
        splunk_docker_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"
        splunk_docker_hec_namespace: "{{ lookup('env', 'HEC_NAMESPACE') | default('', true) }}"
      no_log: true

    - name: Validate HEC_NAMESPACE is a valid UUID
      ansible.builtin.assert:
        that:
          - splunk_docker_hec_namespace is match('^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$')
        fail_msg: >-
          HEC_NAMESPACE must be a valid UUID (e.g. uuidgen output).
          Got: {{ splunk_docker_hec_namespace | default('(empty)') }}
      when: splunk_docker_hec_namespace | length > 0

    # Derive a dedicated per-index HEC token via UUID v5 (Ansible core to_uuid:
    # uuid5('splunk-hec-<index>', HEC_NAMESPACE)). The legacy token deliberately
    # stays = SPLUNK_HEC_TOKEN (NOT derived) so enabling HEC_NAMESPACE does not
    # rotate it and break senders still on the shared token — they migrate to
    # their per-index token one at a time, then legacy is retired.
    - name: Derive per-index HEC token values from namespace
      vars:
        index_names: "{{ splunk_docker_indexes | map(attribute='name') | list }}"
      ansible.builtin.set_fact:
        splunk_docker_hec_token_values: >-
          {{
            dict(index_names | zip(
              index_names | map('regex_replace', '^', 'splunk-hec-') | map('to_uuid', splunk_docker_hec_namespace)
            )) | combine({'legacy': lookup('env', 'SPLUNK_HEC_TOKEN')})
          }}
      when: splunk_docker_hec_namespace | length > 0
      no_log: true

    # Fallback: if no namespace, only the shared SPLUNK_HEC_TOKEN legacy token exists
    - name: Set legacy HEC token (no namespace configured)
      ansible.builtin.set_fact:
        splunk_docker_hec_token_values: >-
          {{ {'legacy': lookup('env', 'SPLUNK_HEC_TOKEN')} }}
      when: splunk_docker_hec_namespace | length == 0
      no_log: true

    - name: Deploy Splunk Docker
      ansible.builtin.include_role:
        name: splunk_docker

  post_tasks:
    - name: Wait for Splunk to be ready after any restarts
      ansible.builtin.include_role:
        name: splunk_docker
        tasks_from: wait_for_splunk

- name: Apply systemd restart policies
  hosts: splunk
  become: true
  gather_facts: false
  tags:
    - restart-policy
    - hardening

  roles:
    - role: systemd_restart_policy
      vars:
        systemd_restart_policy_services:
          - docker
